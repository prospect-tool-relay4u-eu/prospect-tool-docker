services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-relay4u_sandbox}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-relay4u_sandbox}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/prospect-tool-relay4u-eu/relay4u-be:latest
    environment:
      SPRING_PROFILES_ACTIVE: sandbox
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-relay4u_sandbox}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/prospect-tool-relay4u-eu/relay4u-fe:latest
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  db-data:
